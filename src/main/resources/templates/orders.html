<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Order History</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet" />
  </head>
  <body>
    <div class="container mt-5">
      <h1>Order History</h1>
      <a href="/orderForm" class="btn btn-primary mb-3">Place New Order</a>

      <table class="table table-bordered">
        <thead class="table-dark">
          <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Date</th>
            <th>Status</th>
            <th>Items</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="order : ${orders}">
            <td th:text="${order.id}">1</td>
            <td th:text="${order.customerName}">John Doe</td>
            <td th:text="${order.orderDate}">2024-01-01</td>
            <td th:text="${order.status}">COMPLETED</td>
            <td>
              <ul>
                <li
                  th:each="item : ${order.items}"
                  th:text="${item.product.name + ' x' + item.quantity}"></li>
              </ul>
            </td>
          </tr>
        </tbody>
      </table>

      <a href="/products" class="btn btn-secondary">Back to Products</a>
    </div>
  </body>
</html>
