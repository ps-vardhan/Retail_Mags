<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Retail Manager</title>
    <!-- Use Outfit font for a more modern, premium look -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <style>
      :root {
        --primary-color: #6366f1; /* Indigo */
        --secondary-color: #a855f7; /* Purple */
        --accent-color: #ec4899; /* Pink */
        --bg-color: #0f172a; /* Slate 900 for modern dark theme feel */
        --glass-bg: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
        --text-light: #f8fafc;
        --text-muted: #94a3b8;
      }

      body {
        margin: 0;
        font-family: 'Outfit', sans-serif;
        background-color: var(--bg-color);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden; /* Prevent scrolling from animated blobs */
        color: var(--text-light);
      }

      /* Animated Background Blobs */
      .blob {
        position: absolute;
        filter: blur(80px);
        z-index: 0;
        opacity: 0.6;
        animation: float 10s infinite ease-in-out alternate;
      }
      .blob-1 {
        top: -10%; left: -10%;
        width: 50vw; height: 50vw;
        background: radial-gradient(circle, var(--primary-color), transparent);
        animation-delay: 0s;
      }
      .blob-2 {
        bottom: -10%; right: -10%;
        width: 40vw; height: 40vw;
        background: radial-gradient(circle, var(--secondary-color), transparent);
        animation-duration: 12s;
        animation-delay: -2s;
      }
      .blob-3 {
        top: 20%; right: 20%;
        width: 30vw; height: 30vw;
        background: radial-gradient(circle, var(--accent-color), transparent);
        animation-duration: 8s;
        animation-delay: -4s;
      }

      @keyframes float {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(30px, 50px) scale(1.1); }
      }

      /* Glassmorphism Login Card */
      .login-container {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 420px;
        padding: 40px;
        border-radius: 24px;
        background: var(--glass-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px); /* Safari support */
        border: 1px solid var(--glass-border);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        transform: translateY(0);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        animation: form-entrance 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        opacity: 0;
      }

      .login-container:hover {
        transform: translateY(-5px);
        box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
      }

      @keyframes form-entrance {
        from { opacity: 0; transform: translateY(30px) scale(0.95); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }

      /* Typography */
      h2 {
        font-weight: 700;
        letter-spacing: -0.5px;
        margin-bottom: 2rem;
        background: linear-gradient(to right, #fff, #cbd5e1);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* Custom Input Fields */
      .form-floating {
        margin-bottom: 1.5rem;
      }
      
      .form-control {
        background-color: rgba(15, 23, 42, 0.6) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: white !important;
        border-radius: 12px;
        padding: 1rem 1.25rem;
        height: auto;
        transition: all 0.3s ease;
      }

      .form-control:focus {
        background-color: rgba(15, 23, 42, 0.8) !important;
        border-color: var(--primary-color) !important;
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2) !important;
        transform: translateY(-2px);
      }

      .form-control::placeholder {
        color: transparent; /* Assuming floating labels handle this */
      }
      
      .form-floating label {
         color: var(--text-muted);
         padding: 1rem 1.25rem;
      }

      .form-control:focus ~ label,
      .form-control:not(:placeholder-shown) ~ label {
        color: var(--primary-color);
        transform: scale(0.85) translateY(-0.75rem) translateX(0.15rem);
        background-color: transparent !important;
      }
      
      /* Webkit autofill fix for dark theme */
      input:-webkit-autofill,
      input:-webkit-autofill:hover, 
      input:-webkit-autofill:focus, 
      input:-webkit-autofill:active {
          -webkit-box-shadow: 0 0 0 30px #0f172a inset !important;
          -webkit-text-fill-color: white !important;
          transition: background-color 5000s ease-in-out 0s;
      }

      /* Submit Button */
      .btn-primary {
        background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        border: none;
        border-radius: 12px;
        padding: 12px;
        font-weight: 600;
        font-size: 1.1rem;
        letter-spacing: 0.5px;
        margin-top: 1rem;
        margin-bottom: 1.5rem;
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        position: relative;
        overflow: hidden;
        z-index: 1;
      }

      .btn-primary::before {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
        z-index: -1;
        transition: opacity 0.3s ease;
        opacity: 0;
      }

      .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px -10px var(--secondary-color);
      }

      .btn-primary:hover::before {
        opacity: 1;
      }
      
      .btn-primary:active {
        transform: translateY(1px);
      }

      /* Alerts */
      .alert {
        border-radius: 10px;
        border: none;
        font-size: 0.9rem;
        backdrop-filter: blur(4px);
      }
      .alert-danger {
        background-color: rgba(239, 68, 68, 0.15);
        color: #fca5a5;
        border: 1px solid rgba(239, 68, 68, 0.2);
      }
      .alert-success {
        background-color: rgba(34, 197, 94, 0.15);
        color: #86efac;
        border: 1px solid rgba(34, 197, 94, 0.2);
      }

      /* Footer Links */
      .signup-link-container {
        font-size: 0.95rem;
      }
      .signup-link-container a {
        color: var(--secondary-color);
        transition: all 0.2s ease;
        text-underline-offset: 4px;
      }
      .signup-link-container a:hover {
        color: var(--accent-color);
        text-decoration-thickness: 2px;
      }
    </style>
  </head>
  <body>
    <!-- Abstract Background -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <!-- Main Container -->
    <div class="login-container">
      <h2 class="text-center">Welcome Back</h2>

      <!-- Spring Security Status Messages -->
      <div th:if="${param.error}" class="alert alert-danger text-center mb-4" role="alert">
         Invalid credentials. Please try again.
      </div>
      <div th:if="${param.logout}" class="alert alert-success text-center mb-4" role="alert">
         You have successfully logged out.
      </div>
      <div th:if="${param.success}" class="alert alert-success text-center mb-4" role="alert">
         Registration successful! Please sign in.
      </div>

      <!-- Login Form (Thymeleaf bindings intact) -->
      <form th:action="@{/login}" method="post">
        
        <div class="form-floating">
          <input
            type="text"
            name="username"
            class="form-control"
            id="floatingUsername"
            placeholder="Username"
            required autocomplete="off" />
          <label for="floatingUsername">Username</label>
        </div>

        <div class="form-floating">
          <input
            type="password"
            name="password"
            class="form-control"
            id="floatingPassword"
            placeholder="Password"
            required />
          <label for="floatingPassword">Password</label>
        </div>

        <button type="submit" class="btn btn-primary w-100">
          Sign In
        </button>
      </form>

      <div class="text-center signup-link-container mt-2">
        <span class="text-muted">New to Retail Manager? </span>
        <a
          th:href="@{/signup}"
          class="text-decoration-none fw-bold"
          >Create Account</a
        >
      </div>
    </div>
    
  </body>
</html>
