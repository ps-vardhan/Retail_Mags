    <!-- Search Header -->
    <div class="search-header py-4 bg-light">
      <div class="container text-center">
        <h2>What are you looking for today?</h2>
        <form
          th:action="@{/products/search}"
          method="get"
          class="search-box mt-3">
          <div class="input-group input-group-lg">
            <input
              type="text"
              name="q"
              class="form-control rounded-pill"
              placeholder="e.g. 'Durable running shoes for winter' or 'Gifts for tech lovers'..."
              th:value="${searchQuery}" />
            <button
              class="btn btn-warning rounded-pill px-4 ms-2"
              type="submit">
              <i class="fas fa-magic"></i> AI Search
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Search Results Indicator -->
    <div th:if="${isSemantic}" class="container mt-3">
      <div class="alert alert-info">
        <i class="fas fa-robot"></i> AI found these products based on your
        description.
      </div>
    </div>

    <div class="row">
      <div th:each="product : ${listProducts}" class="col-md-4 mb-4">
        <div class="card h-100 shadow-sm">
          <!-- Siphoned Flipkart Image with Fallback -->
          <img
            th:src="${product.mainImageUrl != null ? product.mainImageUrl : '/images/placeholder.png'}"
            class="card-img-top product-thumb"
            alt="Product Image" />

          <div class="card-body">
            <h5 class="card-title" th:text="${product.name}"></h5>

            <!-- Hybrid Content: Local Price + External Rating -->
            <div class="d-flex justify-content-between align-items-center">
              <span
                class="badge bg-success"
                th:text="'₹' + ${product.price}"></span>
              <div
                class="rating-stars"
                th:if="${product.externalRating != null}">
                <i class="fas fa-star text-warning"></i>
                <span th:text="${product.externalRating}"></span>
              </div>
            </div>

            <p
              class="card-text text-muted mt-2"
              th:text="${#strings.abbreviate(product.description, 100)}"></p>

            <a
              th:href="@{/products/detail/{id}(id=${product.id})}"
              class="btn btn-outline-primary btn-block"
              >View Details</a
            >
          </div>
        </div>
      </div>
    </div>
