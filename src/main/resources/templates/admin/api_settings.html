<!doctype html>
<html xmlns:th="https://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API Management</title>
  </head>
  <body>
    <h1>API & AI Configuration</h1>

    <div class="config-section">
      <h3>Flipkart Seller API</h3>
      <form th:action="@{/admin/api-settings/save}" method="post">
        <label for="">Client ID:</label>
        <input
          type="text"
          name="clientId"
          th:value="${flipkartConfig.clientId}" />

        <label for="">Client Secret:</label>
        <input
          type="password"
          name="clientSecret"
          th:value="${flipkartConfig.clientSecret}" />

        <button type="submit">Save Configuration</button>
      </form>
    </div>

    <div class="action-section">
      <h3>Manual Data Sync</h3>
      <p>
        Current sync Status:
        <span class="status-badge" th:text="${syncStatus}">IDLE</span>
      </p>
      <form th:action="@{/admin/products/sync}" method="post">
        <button type="submit" class="danger-btn">
          Siphon All PRoducts from Flipkart
        </button>
      </form>
    </div>
  </body>
</html>
