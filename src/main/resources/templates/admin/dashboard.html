<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet" />
  </head>
  <body class="bg-light p-5">
    <div class="container">
      <h1>Admin Dashboard</h1>
      <hr />
      <p>Welcome, Administrator.</p>
      <div class="row">
        <div class="col-md-4">
          <a href="/products" class="btn btn-primary w-100">Manage Products</a>
        </div>
        <div class="col-md-4">
          <a href="/inventory" class="btn btn-warning w-100"
            >Manage Inventory</a
          >
        </div>
        <div class="col-md-4">
          <a href="/orders" class="btn btn-success w-100">Manage Orders</a>
        </div>
      </div>
      <div class="row mt-4">
        <div class="col-md-12">
          <div class="card shadow border-left-info">
            <div class="card-header bg-info text-white">
              <h5 class="m-0">
                <i class="fas fa-brain"></i>AI Smart Stock Forecast
              </h5>
            </div>
            <div class="card-body">
              <div class="ai-response-container" style="white-space: pre-wrap">
                <p th:text="${stockForecast}"></p>
              </div>
              <hr />
              <small class="text-muted"
                >Predictions are based on last 90 days of sales history.</small
              >
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
