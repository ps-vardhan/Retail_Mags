<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Inventory Manager</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet" />
  </head>
  <body>
    <div class="container mt-5">
      <h1>Inventory Tracking</h1>

      <!-- Add/Update Stock Form -->
      <div class="card p-4 mb-4 bg-light">
        <h4>Update Stock</h4>
        <form action="/updateInventory" method="POST" class="row g-3">
          <div class="col-md-4">
            <label>Product</label>
            <select name="productId" class="form-select">
              <option
                th:each="p : ${products}"
                th:value="${p.id}"
                th:text="${p.name}"></option>
            </select>
          </div>
          <div class="col-md-3">
            <label>Quantity</label>
            <input
              type="number"
              name="quantity"
              class="form-control"
              required />
          </div>
          <div class="col-md-3">
            <label>Location</label>
            <input
              type="text"
              name="location"
              class="form-control"
              placeholder="Warehouse A" />
          </div>
          <div class="col-md-2 align-self-end">
            <button type="submit" class="btn btn-success w-100">Update</button>
          </div>
        </form>
      </div>

      <!-- Inventory Table -->
      <table class="table table-striped table-bordered">
        <thead class="table-dark">
          <tr>
            <th>Product</th>
            <th>SKU</th>
            <th>Quantity</th>
            <th>Location</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="inv : ${inventoryList}">
            <td th:text="${inv.product.name}">Laptop</td>
            <td th:text="${inv.product.sku}">SKU-123</td>
            <td th:text="${inv.quantity}" class="fw-bold">50</td>
            <td th:text="${inv.location}">Shelf A</td>
            <td>
              <span th:if="${inv.quantity < 10}" class="badge bg-danger"
                >Low Stock</span
              >
              <span th:if="${inv.quantity >= 10}" class="badge bg-success"
                >In Stock</span
              >
            </td>
          </tr>
        </tbody>
      </table>

      <a href="/products" class="btn btn-secondary mt-3">Back to Products</a>
    </div>
  </body>
</html>
