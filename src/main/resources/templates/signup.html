<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Sign Up | Retail Manager</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <style>
      /* Reusing consistent styles but with a fresh green gradient for signup */
      body {
        background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      .card {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 15px;
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        width: 100%;
        max-width: 400px;
      }
      .form-control {
        border-radius: 20px;
        padding: 10px 20px;
      }
      .btn-success {
        border-radius: 20px;
        padding: 10px;
        background-color: #11998e;
        border: none;
      }
      .btn-success:hover {
        background-color: #0e857b;
      }
    </style>
  </head>
  <body>
    <div class="card p-5">
      <h2 class="text-center mb-4 fw-bold" style="color: #4a4a4a">Join Us</h2>

      <form th:action="@{/signup}" th:object="${user}" method="post">
        <div class="mb-3">
          <input
            type="text"
            th:field="*{username}"
            class="form-control"
            placeholder="Username"
            required />
        </div>
        <div class="mb-4">
          <input
            type="password"
            th:field="*{password}"
            class="form-control"
            placeholder="Password"
            required />
        </div>
        <!-- Role is forced to CUSTOMER in backend -->

        <button type="submit" class="btn btn-success w-100 mb-3">
          Sign Up
        </button>
      </form>

      <div class="text-center">
        <span class="text-muted">Already have an account? </span>
        <a
          th:href="@{/login}"
          class="text-decoration-none fw-bold"
          style="color: #11998e"
          >Log In</a
        >
      </div>
    </div>
  </body>
</html>
