<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Admin Dashboard</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  </head>
  <body class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>Admin Dashboard</h2>
      <form th:action="@{/logout}" method="post">
        <button class="btn btn-outline-secondary btn-sm">Logout</button>
      </form>
    </div>

    <!-- Sync success banner. Shown when AdminController redirects with ?synced=true -->
    <div th:if="${param.synced}" class="alert alert-success">
      Product sync completed successfully.
    </div>

    <!-- Replaces the old Flipkart credentials form. No inputs needed — DummyJSON is unauthenticated. -->
    <h4>Sync Products</h4>
    <form th:action="@{/admin/sync}" method="post" class="mb-5">
      <button type="submit" class="btn btn-primary">Sync from DummyJSON</button>
    </form>

    <h4>Add Product</h4>
    <form th:action="@{/admin/products/add}" method="post" class="row g-2 mb-5">
      <div class="col-md-3">
        <input
          type="text"
          name="name"
          class="form-control"
          placeholder="Name"
          required />
      </div>
      <div class="col-md-3">
        <input
          type="text"
          name="description"
          class="form-control"
          placeholder="Description" />
      </div>
      <div class="col-md-2">
        <input
          type="number"
          name="price"
          step="0.01"
          class="form-control"
          placeholder="Price"
          required />
      </div>
      <div class="col-md-2">
        <input
          type="text"
          name="category"
          class="form-control"
          placeholder="Category" />
      </div>
      <div class="col-md-1">
        <input
          type="number"
          name="quantity"
          class="form-control"
          placeholder="Stock"
          required />
      </div>
      <div class="col-md-1">
        <button class="btn btn-success w-100">Add</button>
      </div>
    </form>

    <h4>Products</h4>
    <table class="table table-bordered mb-5">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Price</th>
          <th>Category</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="product : ${products}">
          <td th:text="${product.id}"></td>
          <td th:text="${product.name}"></td>
          <td th:text="'₹' + ${product.price}"></td>
          <td th:text="${product.category}"></td>
          <td>
            <form
              th:action="@{/admin/products/delete/{id}(id=${product.id})}"
              method="post">
              <button class="btn btn-danger btn-sm">Delete</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>

    <h4>Recent Orders</h4>
    <table class="table table-bordered">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>User</th>
          <th>Product</th>
          <th>Qty</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="order : ${orders}">
          <td th:text="${order.id}"></td>
          <td th:text="${order.user.username}"></td>
          <td th:text="${order.product.name}"></td>
          <td th:text="${order.quantity}"></td>
          <td th:text="${order.createdAt}"></td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
