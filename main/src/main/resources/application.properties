spring.application.name=main

# Database
# FIXED: original used {$VAR} — Spring Boot placeholder syntax is ${VAR}.
spring.datasource.url=jdbc:postgresql://localhost:5435/retail_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=8081

# FIXED: data.sql runs before Hibernate DDL by default, so the INSERT in data.sql
# targets a users table that does not yet exist, causing "Failed to execute database script".
# defer-datasource-initialization=true forces the execution order to be:
#   1. Hibernate runs ddl-auto=update (creates/updates tables from @Entity classes)
#   2. data.sql runs (INSERT into now-existing users table)
# spring.sql.init.mode=always is still required to actually run data.sql against
# a non-embedded (PostgreSQL) datasource — without it the script is silently skipped.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# DummyJSON product sync source
product.api.base-url=https://dummyjson.com

# OpenAI
# FIXED: was {$OPENAI_API} — same broken placeholder syntax as DB credentials.
spring.ai.openai.api-key=${OPENAI_API}
spring.ai.openai.embedding.model=text-embedding-ada-002

# pgvector
spring.ai.vectorstore.pgvector.dimensions=1536
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.index-type=HNSW
# Tells PgVectorStore autoconfiguration to CREATE the vector_store table and HNSW index
# on startup if they do not already exist. Without this the table is never created
# and vectorStore.add() throws at runtime on the first sync.
spring.ai.vectorstore.pgvector.initialize-schema=true